            <p style={{ fontSize: 15, color: 'var(--muted)', lineHeight: 1.65, margin: 0, maxWidth: 480 }}>{t.appP}</p>
          </div>

          <div className="pj-challenges-grid">
            {t.ch.map(([n, title, desc]) => (
              <div key={n} className="pj-ch pf-reveal">
                <div className="pj-ch-n">— {n}</div>
                <h3 className="pf-display">{title}</h3>
                <p>{desc}</p>
              </div>
            ))}
          </div>
        </section>

        <section className="pj-mock">
          <div className="pj-mock-band pf-reveal">
            <div className="pf-label" style={{ color: 'rgba(255,255,255,0.55)', marginBottom: 16 }}>{t.mockLabel}</div>
            <h2 className="pf-display" style={{ fontSize: 'clamp(28px, 3.5vw, 44px)', margin: 0, letterSpacing: '-0.02em', fontWeight: 500, lineHeight: 1.05 }}>{t.mockH1}</h2>
            <p style={{ fontSize: 14.5, color: 'rgba(244,241,234,0.6)', marginTop: 14, maxWidth: 560, lineHeight: 1.55 }}>{t.mockP}</p>

            <div className="pj-mock-grid">
              {t.mocks.map(([ti, d], i) => (
                <div key={i} className={`pj-mock-tile ${i === 0 ? 'pj-mock-tile-lg' : ''}`}>
                  <div>
                    <h4 className="pf-display">{ti}</h4>
                    <p>{d}</p>
                  </div>
                  <div className="pj-mock-fakeui">
                    <div className="pj-mock-bar"><div className="pj-mock-bar-fill" style={{ width: i === 0 ? '65%' : '40%' }} /></div>
                    <span className="pj-mock-placeholder">▢ screenshot</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section className="pj-stack">
          <div className="pj-stack-head pf-reveal">
            <div>
              <div className="pf-label" style={{ marginBottom: 18 }}>{t.skLabel}</div>
              <h2 className="pf-display" style={{ fontSize: 'clamp(34px, 5vw, 56px)', margin: 0, lineHeight: 1.05 }}>{t.skH1}</h2>
            </div>
            <p style={{ fontSize: 15, color: 'var(--muted)', lineHeight: 1.65, margin: 0, maxWidth: 480 }}>{t.skP}</p>
          </div>

          <div className="pj-stack-grid">
            {t.skGroups.map(([cat, items]) => (
              <div key={cat} className="pj-stack-card pf-reveal">
                <h4>{cat}</h4>
                <ul>
                  {items.map((it) => <li key={it}>{it}</li>)}
                </ul>
              </div>
            ))}
          </div>
        </section>

        <section className="pj-results">
          <div className="pj-results-head pf-reveal">
            <div className="pf-label" style={{ marginBottom: 18 }}>{t.resLabel}</div>
            <h2 className="pf-display" style={{ fontSize: 'clamp(34px, 5vw, 56px)', margin: 0, lineHeight: 1.05 }}>{t.resH1}</h2>
          </div>
          <div className="pj-results-grid">
            {t.res.map(([v, l], i) => (
              <div key={i} className="pj-result pf-reveal"><strong>{v}</strong><span>{l}</span></div>
            ))}
          </div>
        </section>

        <section className="pj-next">
          <div className="pf-reveal">
            <div className="pf-label" style={{ marginBottom: 18 }}>{t.nextLabel}</div>
            <h2 className="pf-display">{t.nextH1}</h2>
          </div>

          <a href="Travaux.html" style={{ textDecoration: 'none', color: 'inherit', display: 'block' }} className="pf-reveal">
            <div className="pj-next-card">
              <div className="pj-next-visual">
                <h3 className="pf-display pj-cover-headline">TaCom<br /><span style={{ fontStyle: 'italic', fontWeight: 300 }}>—Fav.</span></h3>
              </div>
              <div className="pj-next-info">
                <span className="pf-pill" style={{ alignSelf: 'start' }}>{t.nextProjLabel}</span>
                <h3 className="pf-display">{t.nextH3}</h3>
                <p>{t.nextP}</p>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginTop: 4 }}>
                  {['Next.js 16', 'Sanity', 'GSAP', 'Framer Motion', 'Lenis'].map((s) => <span key={s} className="pf-tag" style={{ fontSize: 11 }}>{s}</span>)}
                </div>
                <span className="pf-btn pf-btn-ghost" style={{ alignSelf: 'start', marginTop: 12, fontSize: 13 }}>{t.nextCta}</span>
              </div>
            </div>
          </a>
        </section>
      </window.PFLayout>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<PagePIPV />);
</script>
</body>
